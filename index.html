  #main-svg{display:block;}
  .node-g{cursor:move;}

</head>

  ['rel_refs',  'e_product',   null, '1' ],
  ['e_orders',  'rel_delivers','1',  null],
  ['rel_delivers','e_pickup',  null, '1' ],
  ['e_pickup',  'rel_uses',    'N',  null],
  ['rel_uses',  'e_locker',    null, '1' ],
  ['e_ngo',     'rel_receives','1',  null],
  ['rel_receives','e_donation',null, 'N' ],
  ['e_product', 'rel_involves','M',  null],
  ['rel_involves','e_donation',null, 'N' ],
];

// ── State ──────────────────────────────────────────────────
const pos={};
NODES.forEach(n=>{pos[n.id]={x:n.x,y:n.y,w:n.w,h:n.h};});
let vx=10,vy=-40,vScale=0.46,dragId=null,panStart=null;
const rootG=document.getElementById('root-g');
const svgEl=document.getElementById('main-svg');
const wrap=document.getElementById('svg-wrap');
let edgeLayer;
const nodeEls={};

// ── Helpers ────────────────────────────────────────────────
function mk(tag,attrs,sty){
  const el=document.createElementNS(NS,tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  if(sty)el.style.cssText=sty;
  return el;
}
const ncx=id=>pos[id].x+pos[id].w/2;
const ncy=id=>pos[id].y+pos[id].h/2;

// ── Sections ───────────────────────────────────────────────
function renderSections(){
  SECTIONS.forEach(s=>{
    const g=mk('g'); g.style.pointerEvents='none';
    g.appendChild(mk('rect',{x:s.x,y:s.y,width:s.w,height:s.h,rx:12,
      fill:s.fill,'fill-opacity':'0.55',stroke:s.stroke,'stroke-width':'1.5','stroke-dasharray':'8 4'}));
    const t=mk('text',{x:s.x+12,y:s.y+20,'font-size':'12','font-weight':'bold',
      'font-family':'Segoe UI,Arial,sans-serif',fill:s.tc});
    t.textContent=s.label; g.appendChild(t); rootG.appendChild(g);
  });
}

// ── Edges ─────────────────────────────────────────────────
function setupEdgeLayer(){
  edgeLayer=mk('g'); edgeLayer.style.pointerEvents='none'; rootG.appendChild(edgeLayer);
}
function updateEdges(){
  edgeLayer.innerHTML='';
  EDGES.forEach(([fid,tid,fc,tc])=>{
    const fn=NODES.find(n=>n.id===fid);
    const lc=fn?fn.stroke:'#aaa';
    const x1=ncx(fid),y1=ncy(fid),x2=ncx(tid),y2=ncy(tid);
    edgeLayer.appendChild(mk('line',{x1,y1,x2,y2,stroke:lc,'stroke-width':'1.4',opacity:'0.78'}));
    if(fc){
      const t=mk('text',{x:x1+(x2-x1)*0.17,y:y1+(y2-y1)*0.17-5,
        'text-anchor':'middle','font-size':'11','font-weight':'bold',
        'font-family':'Segoe UI,Arial,sans-serif',fill:lc});
      t.textContent=fc; edgeLayer.appendChild(t);
    }
    if(tc){
      const t=mk('text',{x:x2+(x1-x2)*0.17,y:y2+(y1-y2)*0.17-5,
        'text-anchor':'middle','font-size':'11','font-weight':'bold',
        'font-family':'Segoe UI,Arial,sans-serif',fill:lc});
      t.textContent=tc; edgeLayer.appendChild(t);
    }
  });
}

// ── Node rendering ─────────────────────────────────────────
function buildNode(n){
  const g=mk('g'); g.setAttribute('data-id',n.id); g.classList.add('node-g');
  const p=pos[n.id];
  if(n.type==='entity'){
    g.appendChild(mk('rect',{x:p.x,y:p.y,width:p.w,height:p.h,rx:'6',
      fill:n.fill,stroke:n.stroke,'stroke-width':'2.5',filter:'url(#shadow)'}));
    const t=mk('text',{x:p.x+p.w/2,y:p.y+p.h/2+5,'text-anchor':'middle',
      'font-size':'13','font-weight':'bold','font-family':'Segoe UI,Arial,sans-serif',fill:n.tc,
      style:'pointer-events:none;user-select:none'});
    t.textContent=n.label; g.appendChild(t);
  } else if(n.type==='attr'){
    g.appendChild(mk('ellipse',{cx:p.x+p.w/2,cy:p.y+p.h/2,rx:p.w/2,ry:p.h/2,
      fill:n.fill,stroke:n.stroke,'stroke-width':'1.5'}));
    const t=mk('text',{x:p.x+p.w/2,y:p.y+p.h/2+4,'text-anchor':'middle',
      'font-size':'11','font-family':'Segoe UI,Arial,sans-serif',fill:n.tc,
      style:`pointer-events:none;user-select:none;${n.pk?'text-decoration:underline;':''}`});
    t.textContent=n.label; g.appendChild(t);
  } else {
    const hw=p.w/2,hh=p.h/2,cx=p.x+hw,cy=p.y+hh;
    g.appendChild(mk('polygon',{
      points:`${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`,
      fill:n.fill,stroke:n.stroke,'stroke-width':'1.8'}));
    const t=mk('text',{x:cx,y:cy+4,'text-anchor':'middle','font-size':'11','font-weight':'bold',
      'font-family':'Segoe UI,Arial,sans-serif',fill:n.tc,
      style:'pointer-events:none;user-select:none'});
    t.textContent=n.label; g.appendChild(t);
  }
  g.addEventListener('mousedown',e=>{
    e.stopPropagation(); dragId=n.id;
    wrap.classList.add('panning'); e.preventDefault();
  });
  nodeEls[n.id]=g; return g;
}

function posNode(id){
  const g=nodeEls[id],p=pos[id],n=NODES.find(x=>x.id===id);
  if(!g||!n) return;
  if(n.type==='entity'){
    g.querySelector('rect').setAttribute('x',p.x);
    g.querySelector('rect').setAttribute('y',p.y);
    const t=g.querySelector('text');
    t.setAttribute('x',p.x+p.w/2); t.setAttribute('y',p.y+p.h/2+5);
  } else if(n.type==='attr'){
    const e=g.querySelector('ellipse');
    e.setAttribute('cx',p.x+p.w/2); e.setAttribute('cy',p.y+p.h/2);
    const t=g.querySelector('text');
    t.setAttribute('x',p.x+p.w/2); t.setAttribute('y',p.y+p.h/2+4);
  } else {
    const hw=p.w/2,hh=p.h/2,cx=p.x+hw,cy=p.y+hh;
    g.querySelector('polygon').setAttribute('points',
      `${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`);
    const t=g.querySelector('text');
    t.setAttribute('x',cx); t.setAttribute('y',cy+4);
  }
}

// ── Transform / pan / zoom ─────────────────────────────────
function applyT(){ rootG.setAttribute('transform',`translate(${vx},${vy}) scale(${vScale})`); }
function resetView(){ vx=10; vy=-40; vScale=0.46; applyT(); }
function zoomBy(f){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  vx=cx-(cx-vx)*f; vy=cy-(cy-vy)*f;
  vScale=Math.min(4,Math.max(0.1,vScale*f)); applyT();
}

wrap.addEventListener('mousedown',e=>{
  if(dragId) return;
  panStart={x:e.clientX-vx,y:e.clientY-vy};
  wrap.classList.add('panning');
});
document.addEventListener('mousemove',e=>{
  if(dragId){
    pos[dragId].x+=e.movementX/vScale;
    pos[dragId].y+=e.movementY/vScale;
    posNode(dragId); updateEdges(); return;
  }
  if(panStart){ vx=e.clientX-panStart.x; vy=e.clientY-panStart.y; applyT(); }
});
document.addEventListener('mouseup',()=>{
  dragId=null; panStart=null; wrap.classList.remove('panning');
});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.9:1.11;
  const r=svgEl.getBoundingClientRect();
  vx=(e.clientX-r.left)-(e.clientX-r.left-vx)*f;
  vy=(e.clientY-r.top) -(e.clientY-r.top -vy)*f;
  vScale=Math.min(4,Math.max(0.1,vScale*f)); applyT();
},{passive:false});
window.addEventListener('resize',()=>{
  svgEl.setAttribute('width',window.innerWidth);
  svgEl.setAttribute('height',window.innerHeight);
});

// ── Download self ──────────────────────────────────────────
function downloadSelf(){
  const blob=new Blob(['<!DOCTYPE html>\n'+document.documentElement.outerHTML],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ERD_FoodRescue.html';
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Init ───────────────────────────────────────────────────
svgEl.setAttribute('width',window.innerWidth);
svgEl.setAttribute('height',window.innerHeight);
renderSections();
setupEdgeLayer();
['attr','rel','entity'].forEach(type=>
  NODES.filter(n=>n.type===type).forEach(n=>rootG.appendChild(buildNode(n)))
);
updateEdges();
applyT();
</script>
</body>
</html>
